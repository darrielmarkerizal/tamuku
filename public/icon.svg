<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#ff3d8a"/>
  <!-- Ear shadows -->
  <circle cx="188" cy="152" r="48" fill="#1a0a14" transform="translate(9,9)"/>
  <circle cx="324" cy="152" r="48" fill="#1a0a14" transform="translate(9,9)"/>
  <!-- Ears -->
  <circle cx="188" cy="152" r="48" fill="white" stroke="#1a0a14" stroke-width="10"/>
  <circle cx="188" cy="152" r="26" fill="#ffb3cc"/>
  <circle cx="324" cy="152" r="48" fill="white" stroke="#1a0a14" stroke-width="10"/>
  <circle cx="324" cy="152" r="26" fill="#ffb3cc"/>
  <!-- Face shadow -->
  <circle cx="256" cy="292" r="150" fill="#1a0a14" transform="translate(9,9)"/>
  <!-- Face -->
  <circle cx="256" cy="292" r="150" fill="white" stroke="#1a0a14" stroke-width="10"/>
  <!-- Blush -->
  <circle cx="178" cy="328" r="32" fill="#ff3d8a" opacity="0.22"/>
  <circle cx="334" cy="328" r="32" fill="#ff3d8a" opacity="0.22"/>
  <!-- Left eye -->
  <circle cx="210" cy="270" r="18" fill="#1a0a14"/>
  <circle cx="205" cy="263" r="6" fill="white"/>
  <!-- Right eye -->
  <circle cx="302" cy="270" r="18" fill="#1a0a14"/>
  <circle cx="297" cy="263" r="6" fill="white"/>
  <!-- Smile -->
  <path d="M 208,325 Q 256,378 304,325" stroke="#1a0a14" stroke-width="12" fill="none" stroke-linecap="round"/>
</svg>
